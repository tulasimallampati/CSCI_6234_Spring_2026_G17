<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LearnMesh | Home</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Global CSS with cache-busting -->
    <link rel="stylesheet" th:href="@{/css/global.css?v=11}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1500&q=80')
                        no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        /* HERO SECTION — LARGER BUT STILL FITS ONE SCREEN */
        .hero {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 90px 20px 0; /* increased but still safe */
        }

        .hero h1 {
            font-size: 62px; /* larger */
            font-family: 'Playfair Display', serif;
            color: #00264d;
            margin-bottom: 10px;
        }

        .motto {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px; /* larger */
            font-weight: 600;
            color: #002a4d;
            margin-bottom: 20px;
            font-style: italic;
        }
		footer {
		            position: relative;
		            z-index: 3;
		            text-align: center;
		            padding: 20px;
		            background: #003366;
		            color: white;
		            margin-top: 60px;
		        }

        .hero-card {
            width: 58%; /* wider */
            margin: auto;
            padding: 26px; /* larger */
            background: rgba(255, 255, 255, 0.55);
            border-radius: 14px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .hero-card p {
            font-size: 20px; /* larger */
            line-height: 1.55;
            color: #003366;
            margin: 0;
        }

        .btn-container {
            margin-top: 30px; /* slightly larger */
            display: flex;
            justify-content: center;
            gap: 24px;
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <!-- NAVIGATION -->
    <nav>
        <div class="logo">LearnMesh</div>
        <ul>

            <li>
                <a th:if="${page != 'home'}" href="/">Home</a>
                <span th:if="${page == 'home'}" class="disabled-link">Home</span>
            </li>

            <li>
                <a th:if="${page != 'about'}" href="/about">About</a>
                <span th:if="${page == 'about'}" class="disabled-link">About</span>
            </li>

        </ul>
    </nav>

    <!-- HERO CONTENT -->
    <div class="hero">
        <h1>LearnMesh</h1>
        <h2 class="motto">Where Learners Link and Ideas Thrive.</h2>

        <div class="hero-card">
            <p>
                A real-time collaborative learning platform that intelligently forms study groups 
                based on your skills, availability, and learning style.
            </p>
        </div>

        <div class="btn-container">
            <a href="/register"><button class="btn-primary">Get Started</button></a>
            <a href="/login"><button class="btn-secondary">Login</button></a>
        </div>
    </div>
	<footer>
	       © 2026 LearnMesh — Where Learners Link and Ideas Thrive.
	   </footer>
</body>
</html>
