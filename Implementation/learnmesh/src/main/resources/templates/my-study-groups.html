<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Study Groups | LearnMesh</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=25}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1500&q=80')
                        no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(6px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 3;
            width: 900px;
            margin: 140px auto;
        }

        h1 {
            font-size: 42px;
            font-family: 'Playfair Display', serif;
            color: #00264d;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 26px;
            font-weight: 600;
            color: #003366;
            margin-top: 40px;
            margin-bottom: 15px;
        }

        .group-card {
            background: rgba(255,255,255,0.55);
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 18px;
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .group-title {
            font-size: 22px;
            font-weight: 600;
            color: #003366;
            margin-bottom: 8px;
        }

        .group-title a {
            text-decoration: none;
            color: #003366;
        }

        .group-title a:hover {
            text-decoration: underline;
        }

        .actions {
            margin-top: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        .btn-edit { background: #0059b3; color: white; }
        .btn-delete { background: #cc0000; color: white; }
        .btn-leave { background: #cc6600; color: white; }

        .empty-text {
            font-size: 16px;
            color: #003366;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* ⭐ FINAL HEADER — MATCHES DASHBOARD EXACTLY */
        nav {
            background: rgba(0, 38, 77, 0.85); /* same as dashboard */
            backdrop-filter: blur(6px);
            padding: 15px 50px; /* increased so Logout never goes off-screen */
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 5;
        }

        nav .logo {
            font-size: 26px;
            font-weight: 700;
            color: white;
            font-family: 'Playfair Display', serif;
            white-space: nowrap;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 35px; /* increased spacing for clean layout */
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<!-- ⭐ FINAL HEADER YOU REQUESTED -->
<nav>
    <div class="logo">LearnMesh</div>
    <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/groups">Browse Groups</a></li>
        <li><a href="/groups/create">Create Group</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container">

    <h1>My Study Groups</h1>

    <!-- ⭐ Groups I Created -->
    <h2>Groups I Created</h2>

    <div th:if="${myCreatedGroups.isEmpty()}">
        <p class="empty-text">You haven't created any groups yet.</p>
    </div>

    <div th:each="group : ${myCreatedGroups}" class="group-card">
        <div class="group-title">
            <a th:href="@{'/groups/' + ${group.id}}" th:text="${group.name}"></a>
        </div>

        <p><strong>Technology:</strong> <span th:text="${group.technology}"></span></p>
        <p><strong>Knowledge Level:</strong> <span th:text="${group.knowledgeLevel}"></span></p>

        <div class="actions">
            <a th:href="@{'/groups/' + ${group.id} + '/edit'}">
                <button class="btn btn-edit">Edit</button>
            </a>

            <form th:action="@{'/groups/' + ${group.id} + '/delete'}" method="post" style="display:inline;">
                <button class="btn btn-delete" type="submit">Delete</button>
            </form>
        </div>
    </div>

    <!-- ⭐ Groups I Joined -->
    <h2>Groups I Joined</h2>

    <div th:if="${myJoinedGroups.isEmpty()}">
        <p class="empty-text">You haven't joined any groups yet.</p>
    </div>

    <div th:each="group : ${myJoinedGroups}" class="group-card">
        <div class="group-title">
            <a th:href="@{'/groups/' + ${group.id}}" th:text="${group.name}"></a>
        </div>

        <p><strong>Technology:</strong> <span th:text="${group.technology}"></span></p>
        <p><strong>Knowledge Level:</strong> <span th:text="${group.knowledgeLevel}"></span></p>

        <div class="actions">
            <form th:action="@{'/groups/' + ${group.id} + '/leave'}" method="post" style="display:inline;">
                <button class="btn btn-leave" type="submit">Leave Group</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
