<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | LearnMesh</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=20}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1500&q=80')
                        no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .login-box {
            position: relative;
            z-index: 3;
            width: 420px;
            margin: 140px auto;
            background: rgba(255, 255, 255, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
        }

        h1 {
            font-size: 42px;
            font-family: 'Playfair Display', serif;
            color: #00264d;
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-size: 16px;
            font-weight: 600;
            color: #003366;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0 5px;
            border-radius: 10px;
            border: 1px solid #b7c9d6;
            font-size: 16px;
            background: rgba(255,255,255,0.85);
        }

        .error-message {
            color: #cc0000;
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .center {
            text-align: center;
        }

        footer {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 20px;
            background: #003366;
            color: white;
            margin-top: 60px;
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <nav>
        <div class="logo">LearnMesh</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <div class="login-box">
        <h1>Login</h1>

        <p class="error-message" th:if="${loginError}" th:text="${loginError}"></p>

        <form th:action="@{/login}" method="post">

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <div class="center">
                <button class="btn-primary" type="submit">Login</button>
            </div>
        </form>

        <div class="center small-link">
            Don't have an account? <a href="/register">Register</a>
        </div>
    </div>

    <footer>
        © 2026 LearnMesh — Where Learners Link and Ideas Thrive.
    </footer>

</body>
</html>
