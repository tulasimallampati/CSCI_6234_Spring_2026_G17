<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Study Group | LearnMesh</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=25}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1500&q=80')
                        no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .form-box {
            position: relative;
            z-index: 3;
            width: 650px;
            margin: 140px auto;
            background: rgba(255, 255, 255, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
        }

        h1 {
            font-size: 42px;
            font-family: 'Playfair Display', serif;
            color: #00264d;
            margin-bottom: 20px;
        }

        label {
            font-size: 16px;
            font-weight: 600;
            color: #003366;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 5px;
            border-radius: 10px;
            border: 1px solid #b7c9d6;
            font-size: 16px;
        }

        textarea {
            height: 120px;
        }

        .btn-primary {
            background: #0059b3;
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            background: #003366;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: -5px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="form-box">

    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>

    <h1 th:text="${studyGroup.id == null ? 'Create Study Group' : 'Edit Study Group'}"></h1>

    <form th:action="${studyGroup.id == null} ? @{/groups/create} : @{/groups/{id}/edit(id=${studyGroup.id})}"
          th:object="${studyGroup}"
          method="post">

        <!-- ⭐ Group Name -->
        <label>Group Name *</label>
        <input type="text" th:field="*{name}" required />
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

        <!-- ⭐ Branch -->
        <label>Branch *</label>
        <select id="branchSelect" th:field="*{branch}" required>
            <option value="">-- Select Branch --</option>
            <option th:each="b : ${branches}" th:value="${b}" th:text="${b}"></option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('branch')}" th:errors="*{branch}"></div>

        <!-- ⭐ Technology -->
        <label>Technology / Course *</label>
        <select id="technologySelect"
                th:field="*{technology}"
                th:attr="data-selected=${studyGroup.technology}"
                required>
            <option value="">-- Select Technology --</option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('technology')}" th:errors="*{technology}"></div>

        <!-- ⭐ Knowledge Level -->
        <label>Knowledge Level *</label>
        <select th:field="*{knowledgeLevel}" required>
            <option value="">-- Select Level --</option>
            <option th:each="lvl : ${levels}" th:value="${lvl}" th:text="${lvl}"></option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('knowledgeLevel')}" th:errors="*{knowledgeLevel}"></div>

        <!-- ⭐ Description -->
        <label>Description *</label>
        <textarea th:field="*{description}" required></textarea>
        <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

        <!-- ⭐ Start Time -->
        <label>Start Time *</label>
        <input type="datetime-local"
               name="startTime"
               th:value="${formattedStartTime}"
               required />
        <div class="error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></div>

        <!-- ⭐ End Time -->
        <label>End Time *</label>
        <input type="datetime-local"
               name="endTime"
               th:value="${formattedEndTime}"
               required />
        <div class="error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></div>

        <!-- ⭐ Meeting Mode -->
        <label>Meeting Mode *</label>
        <select id="meetingModeSelect" th:field="*{meetingMode}" required>
            <option value="">-- Select Mode --</option>
            <option th:each="m : ${modes}" th:value="${m}" th:text="${m}"></option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('meetingMode')}" th:errors="*{meetingMode}"></div>

        <!-- ⭐ Conditional Meeting Location -->
        <div id="locationContainer" style="display:none;">
            <label>Meeting Location *</label>
            <input type="text" id="meetingLocationInput" th:field="*{meetingLocation}">
            <div class="error" th:if="${#fields.hasErrors('meetingLocation')}" th:errors="*{meetingLocation}"></div>
        </div>

        <!-- ⭐ Meeting Frequency -->
        <label>Meeting Frequency</label>
        <select th:field="*{meetingFrequency}">
            <option value="">-- Select Frequency --</option>
            <option th:each="f : ${frequencies}" th:value="${f}" th:text="${f}"></option>
        </select>

        <!-- ⭐ Maximum Members -->
        <label>Maximum Members *</label>
        <input type="number" th:field="*{maxMembers}" min="2" max="100" required />
        <div class="error" th:if="${#fields.hasErrors('maxMembers')}" th:errors="*{maxMembers}"></div>

        <!-- ⭐ Optional: Required Materials -->
        <label>Required Materials</label>
        <input type="text" th:field="*{requiredMaterials}" />

        <!-- ⭐ Optional: Topics to Cover -->
        <label>Topics to Cover</label>
        <textarea th:field="*{topicsToCover}"></textarea>

        <div style="text-align:center; margin-top:20px;">
            <button class="btn-primary" type="submit"
                    th:text="${studyGroup.id == null ? 'Create Group' : 'Update Group'}"></button>
        </div>

    </form>

</div>

<!-- ⭐ Dynamic Technology Loading -->
<script>
document.getElementById("branchSelect").addEventListener("change", function () {
    const branch = this.value;
    const techSelect = document.getElementById("technologySelect");

    techSelect.innerHTML = '<option value="">-- Select Technology --</option>';

    if (!branch) return;

    fetch(`/groups/technologies?branch=${branch}`)
        .then(res => res.json())
        .then(data => {
            data.forEach(t => {
                techSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
        });
});
</script>

<!-- ⭐ Auto-load technologies on page load -->
<script>
window.addEventListener("DOMContentLoaded", function () {
    const branch = document.getElementById("branchSelect").value;
    const techSelect = document.getElementById("technologySelect");
    const selectedTech = techSelect.getAttribute("data-selected");

    if (branch) {
        fetch(`/groups/technologies?branch=${branch}`)
            .then(res => res.json())
            .then(data => {
                techSelect.innerHTML = '<option value="">-- Select Technology --</option>';
                data.forEach(t => {
                    techSelect.innerHTML += `<option value="${t}">${t}</option>`;
                });

                if (selectedTech) {
                    techSelect.value = selectedTech;
                }
            });
    }
});
</script>

<!-- ⭐ Conditional Meeting Location Logic -->
<script>
function updateLocationVisibility() {
    const mode = document.getElementById("meetingModeSelect").value;
    const container = document.getElementById("locationContainer");
    const input = document.getElementById("meetingLocationInput");

    if (mode === "IN_PERSON" || mode === "HYBRID") {
        container.style.display = "block";
        input.required = true;
    } else {
        container.style.display = "none";
        input.required = false;
        input.value = "";
    }
}

document.getElementById("meetingModeSelect").addEventListener("change", updateLocationVisibility);
updateLocationVisibility();
</script>

</body>
</html>
