<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Set Learning Preferences | LearnMesh</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=25}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1500&q=80')
                        no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        nav {
            position: relative;
            z-index: 3;
            background: transparent;
        }

        .form-box {
            position: relative;
            z-index: 3;
            width: 650px;
            margin: 140px auto;
            background: rgba(255, 255, 255, 0.55);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
        }

        h1 {
            font-size: 42px;
            font-family: 'Playfair Display', serif;
            color: #00264d;
            margin-bottom: 20px;
        }

        label {
            font-size: 16px;
            font-weight: 600;
            color: #003366;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 5px;
            border-radius: 10px;
            border: 1px solid #b7c9d6;
            font-size: 16px;
        }

        textarea {
            height: 120px;
        }

        .btn-primary {
            background: #0059b3;
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .success-box {
            background: #e6ffe6;
            border-left: 5px solid #00b300;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #006600;
            font-weight: 600;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            background: #003366;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<nav>
    <div class="logo">LearnMesh</div>
    <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/recommendations">View Recommendations</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="form-box">

    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>

    <h1>Set Learning Preferences</h1>

    <div th:if="${param.saved}" class="success-box">Preferences saved successfully!</div>

    <form th:action="@{/preferences}" th:object="${preference}" method="post">

        <!-- ⭐ BRANCH -->
        <label>Branch *</label>
        <select id="branchSelect" th:field="*{branch}">
            <option value="">-- Select Branch --</option>
            <option th:each="b : ${branches}" th:value="${b}" th:text="${b}"></option>
        </select>

        <!-- ⭐ TECHNOLOGY (Dynamic) -->
        <label>Technology / Course *</label>
        <select id="technologySelect" th:field="*{technology}">
            <option value="">-- Select Technology --</option>
        </select>

        <label>Knowledge Level *</label>
        <select th:field="*{knowledgeLevel}">
            <option value="">-- Select Level --</option>
            <option th:each="lvl : ${levels}" th:value="${lvl}" th:text="${lvl}"></option>
        </select>

        <label>Topics to Cover (Optional)</label>
        <textarea th:field="*{topicsToCover}"></textarea>

        <label>Preferred Start Time *</label>
        <input type="datetime-local" th:field="*{preferredStartTime}">

        <label>Preferred End Time *</label>
        <input type="datetime-local" th:field="*{preferredEndTime}">

        <label>Preferred Meeting Mode *</label>
        <select th:field="*{preferredMeetingMode}">
            <option value="">-- Select Mode --</option>
            <option th:each="m : ${modes}" th:value="${m}" th:text="${m}"></option>
        </select>

        <div style="text-align:center; margin-top:20px;">
            <button class="btn-primary" type="submit">Save Preferences</button>
        </div>

    </form>

</div>

<!-- ⭐ DYNAMIC TECHNOLOGY LOADING SCRIPT -->
<script>
document.getElementById("branchSelect").addEventListener("change", function () {
    const branch = this.value;
    const techSelect = document.getElementById("technologySelect");

    techSelect.innerHTML = '<option value="">-- Select Technology --</option>';

    if (!branch) return;

    fetch(`/preferences/technologies?branch=${branch}`)
        .then(res => res.json())
        .then(data => {
            data.forEach(t => {
                techSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
        });
});
</script>

</body>
</html>
