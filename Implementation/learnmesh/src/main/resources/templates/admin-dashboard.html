<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard | LearnMesh</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css?v=25}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1500&q=80')
                        no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 3;
            width: 900px;
            margin: 140px auto;
        }

        h1 {
            font-size: 42px;
            font-family: 'Playfair Display', serif;
            color: #00264d;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.55);
            padding: 25px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
            text-align: center;
            width: 260px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .stat-number {
            font-size: 40px;
            font-weight: 700;
            color: #003366;
        }

        .stat-label {
            font-size: 18px;
            color: #004080;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<!-- ⭐ EXACT SAME HEADER AS LOGIN PAGE (only links changed) -->
<nav>
    <div class="logo">LearnMesh</div>
    <ul>
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Admin Dashboard</h1>

    <div class="stats-grid">

        <a href="/admin/users" style="text-decoration:none;">
            <div class="card">
                <div class="stat-number" th:text="${totalUsers}"></div>
                <div class="stat-label">Total Users</div>
            </div>
        </a>

        <a href="/admin/groups" style="text-decoration:none;">
            <div class="card">
                <div class="stat-number" th:text="${totalGroups}"></div>
                <div class="stat-label">Total Groups</div>
            </div>
        </a>

    </div>
</div>

</body>
</html>
